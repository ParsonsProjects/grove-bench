name: PR Size

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: pr-size-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    name: Label PR size
    runs-on: ubuntu-latest
    steps:
      - name: Apply size label
        uses: actions/github-script@v7
        with:
          script: |
            const sizeLabels = [
              { name: "size/XS",  color: "3cbf00", maxLines: 9,    description: "Extra small change (< 10 lines)" },
              { name: "size/S",   color: "5bb700", maxLines: 29,   description: "Small change (10–29 lines)" },
              { name: "size/M",   color: "7f9f00", maxLines: 99,   description: "Medium change (30–99 lines)" },
              { name: "size/L",   color: "a38700", maxLines: 499,  description: "Large change (100–499 lines)" },
              { name: "size/XL",  color: "c76f00", maxLines: 999,  description: "Extra large change (500–999 lines)" },
              { name: "size/XXL", color: "eb5700", maxLines: Infinity, description: "Massive change (1000+ lines)" },
            ];

            // Ensure all size labels exist
            for (const label of sizeLabels) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });
                if (existing.color !== label.color || (existing.description ?? "") !== label.description) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              }
            }

            // Get PR diff stats
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const changedLines = (pr.additions || 0) + (pr.deletions || 0);
            const matchedLabel = sizeLabels.find(l => changedLines <= l.maxLines);

            // Get current labels on the PR
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            // Remove old size labels
            const sizeNames = sizeLabels.map(l => l.name);
            for (const label of currentLabels) {
              if (sizeNames.includes(label.name) && label.name !== matchedLabel.name) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: label.name,
                });
              }
            }

            // Add the correct size label
            const alreadyHas = currentLabels.some(l => l.name === matchedLabel.name);
            if (!alreadyHas) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [matchedLabel.name],
              });
            }

            console.log(`PR #${context.payload.pull_request.number}: ${changedLines} lines → ${matchedLabel.name}`);
