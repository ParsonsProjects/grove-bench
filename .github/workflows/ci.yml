name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'landing/**'
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'landing/**'
      - '*.md'
      - 'docs/**'

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # Skip postinstall (electron-rebuild) — the type-check and tests don't
        # need native modules compiled (node-pty is mocked, electron aliased),
        # and rebuilding fails on the runner's newer Visual Studio toolchain.
        run: npm ci --ignore-scripts

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
