name: Bug report
description: Report broken behavior, regressions, crashes, or reliability issues.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for broken behavior, regressions, crashes, or reliability problems.
        Search existing issues first and keep the report focused on one problem.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I included enough detail to reproduce or investigate the problem.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - Main process (sessions, git, PTY, adapters)
        - Renderer (UI, components, stores)
        - Worktree management
        - Terminal / node-pty
        - Build, packaging, or installer
        - Landing page
        - Not sure
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal, deterministic repro.
      placeholder: |
        1. Open Grove Bench
        2. Add a repository
        3. Create a new agent session
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How bad is this in practice?
      options:
        - Blocks work completely
        - Major degradation or frequent failure
        - Minor bug or occasional failure
        - Cosmetic issue
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: App version, commit SHA, or branch name.
      placeholder: v0.1.0 or main @ abc1234

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Windows version, Git version, Claude Code version.
      placeholder: Windows 11 24H2, Git 2.47.0, Claude Code 1.0.0

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Paste relevant output from %APPDATA%/grove-bench/logs/ or the dev console. Redact secrets.
      render: shell

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: If you found a temporary workaround, include it.
