      <h1>Grove Bench — Multi-Agent Git Worktree Orchestrator</h1>
      <p>Run multiple Claude Code AI agents in parallel on the same repository. Each agent gets its own git worktree, branch, and dedicated PTY terminal — zero branch conflicts by design.</p>
      <h2>Features</h2>
      <ul>
        <li><strong>Worktree Isolation</strong> — Each agent gets its own git worktree. No branch conflicts, no stepping on each other's changes.</li>
        <li><strong>Dedicated PTY Terminals</strong> — Real interactive terminals per session with full color output and environment persistence.</li>
        <li><strong>Parallel Agents</strong> — Run multiple Claude Code agents simultaneously on the same repository.</li>
        <li><strong>Windows Native</strong> — Built with Electron for Windows. Proper file locking, PATH_MAX safety, native installer.</li>
      </ul>
      <h2>How It Works</h2>
      <ol>
        <li>Add a repository — Point Grove Bench at any local git repo.</li>
        <li>Spawn agents — Each agent gets an isolated worktree and branch.</li>
        <li>Work in parallel — Review diffs, manage permissions, merge when ready.</li>
      </ol>
